<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
    <!-- Fondo amarillo -->
    <rect width="400" height="300" fill="#FFD000"/>

    <!-- Sándwich/Gapata -->
    <!-- Pan superior (oscuro) -->
    <ellipse cx="200" cy="80" rx="80" ry="30" fill="#8B7355"/>

    <!-- Pan superior con textura -->
    <circle cx="170" cy="75" r="6" fill="#A0826D" opacity="0.6"/>
    <circle cx="200" cy="70" r="6" fill="#A0826D" opacity="0.6"/>
    <circle cx="230" cy="75" r="6" fill="#A0826D" opacity="0.6"/>

    <!-- Relleno visible (carnes) -->
    <ellipse cx="200" cy="150" rx="85" ry="50" fill="#D4654A"/>

    <!-- Salsa roja -->
    <path d="M 150 145 Q 155 155 160 150 Q 165 160 170 155 Q 175 165 180 158" stroke="#C41E3A" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M 210 158 Q 215 168 220 162 Q 225 172 230 165" stroke="#C41E3A" stroke-width="3" fill="none" stroke-linecap="round"/>

    <!-- Lechuga (verde) -->
    <ellipse cx="200" cy="135" rx="75" ry="15" fill="#6BA82C"/>
    <path d="M 140 135 Q 150 130 160 135 Q 170 130 180 135 Q 190 130 200 135 Q 210 130 220 135 Q 230 130 240 135 Q 250 130 260 135" stroke="#5A8C1F" stroke-width="2" fill="none" stroke-linecap="round"/>

    <!-- Pan inferior (oscuro) -->
    <ellipse cx="200" cy="220" rx="80" ry="25" fill="#8B7355"/>

    <!-- Pan inferior con textura -->
    <circle cx="170" cy="225" r="6" fill="#A0826D" opacity="0.6"/>
    <circle cx="200" cy="230" r="6" fill="#A0826D" opacity="0.6"/>
    <circle cx="230" cy="225" r="6" fill="#A0826D" opacity="0.6"/>
</svg>
