<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
    <!-- Círculo exterior blanco -->
    <circle cx="100" cy="100" r="95" fill="none" stroke="white" stroke-width="8"/>

    <!-- Círculo interior negro -->
    <circle cx="100" cy="100" r="85" fill="#1A1A1A"/>

    <!-- Ícono de pata (huella de gato/perro) -->
    <g fill="white">
        <!-- Almohadilla central (grande) -->
        <ellipse cx="100" cy="110" rx="18" ry="22"/>

        <!-- Almohadillas de dedos -->
        <!-- Arriba -->
        <ellipse cx="70" cy="65" rx="10" ry="14" transform="rotate(-30 70 65)"/>
        <ellipse cx="100" cy="50" rx="10" ry="14"/>
        <ellipse cx="130" cy="65" rx="10" ry="14" transform="rotate(30 130 65)"/>

        <!-- Abajo derecha -->
        <ellipse cx="145" cy="95" rx="10" ry="14" transform="rotate(60 145 95)"/>
    </g>
</svg>
